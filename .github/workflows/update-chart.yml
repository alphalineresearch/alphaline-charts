name: Update Charts Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-charts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETH Stacked TVL chart
        run: python scripts/generate_eth_stacked_tvl.py

      - name: Run BTC RV Proxy Signal chart
        run: python scripts/generate_btc_rv_proxy_signal.py

      - name: Run ETH Stable Model Compact chart
        run: python scripts/generate_eth_stable_model_compact.py

      - name: Run ETH Combined TVL chart
        run: python scripts/generate_eth_combined_tvl.py

      - name: Run ETH Proxy Signal chart
        run: python scripts/generate_eth_proxy_signal.py

      - name: Run MSTR P/NAV Heatmap chart
        run: python scripts/generate_mstr_pnav_heatmap.py

      - name: Run RSI Charts
        run: python scripts/generate_rsi_charts.py

      - name: Run ETH TVL Momentum
        run: python scripts/generate_eth_tvl_momentum.py

      - name: Commit and push updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/eth_stacked_tvl.html docs/btc_rv7_rv30_proxy_signal.html docs/eth_stable_model_compact.html docs/eth_combined_tvl.html docs/eth_proxy_signal.html docs/mstr_pnav_heatmap.html docs/btc_rsi_weekly.html docs/eth_rsi_weekly.html docs/btc_rsi_annual.html docs/eth_rsi_annual.html docs/eth_tvl_momentum.html
          git diff --staged --quiet || git commit -m "chore: update charts $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push