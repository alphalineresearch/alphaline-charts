name: Update ETH Stacked TVL Chart

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-chart:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run chart script
        run: python scripts/generate_eth_stacked_tvl.py

      - name: Commit and push updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/eth_stacked_tvl.html
          git diff --staged --quiet || git commit -m "chore: update chart $(date -u '+%Y-%m-%d')"
          git push