name: Update Charts Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-charts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETH Stacked TVL chart
        run: python scripts/generate_eth_stacked_tvl.py

      - name: Run BTC RV Proxy Signal chart
        run: python scripts/generate_btc_rv_proxy_signal.py

      - name: Run ETH Stable Model Compact chart
        run: python scripts/generate_eth_stable_model_compact.py

      - name: Commit and push updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/eth_stacked_tvl.html docs/btc_rv7_rv30_proxy_signal.html docs/eth_stable_model_compact.html
          git diff --staged --quiet || git commit -m "chore: update charts $(date -u '+%Y-%m-%d')"
          git push